version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - yarn install --frozen-lockfile
        - npx puppeteer browsers install chrome
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - ~/.cache/puppeteer/**/*
